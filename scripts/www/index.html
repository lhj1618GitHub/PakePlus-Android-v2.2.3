<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON/JSON5 转换格式化工具</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            padding: 20px;
            background: #121212; /* 背景改为黑色 */
            color: #e0e0e0; /* 文字颜色改为浅灰色，确保可读性 */
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ffffff; /* 标题文字改为白色 */
            margin-bottom: 20px;
            font-size: 24px;
        }
        .editor-group {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .panel-title {
            padding: 10px 15px;
            background: #1e1e1e; /* 标题栏背景改为深灰色 */
            color: white;
            border-radius: 6px 6px 0 0;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            border: 1px solid #333; /* 边框改为深灰色 */
            border-bottom: none;
        }
        .panel-info {
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 13px;
            font-weight: normal;
        }
        .cursor-pos {
            color: #4dabf7; /* 光标位置文字颜色改为亮蓝色 */
            font-weight: 500;
        }
        .error-msg {
            color: #ff6b6b;
            font-weight: 500;
        }
        .format-btns {
            display: flex;
            gap: 6px;
        }
        .format-btn {
            padding: 4px 8px;
            font-size: 12px;
            background: #3498db; /* 按钮背景保持蓝色 */
            border: none;
            border-radius: 4px;
            color: white; /* 按钮文字保持白色 */
            cursor: pointer;
        }
        .format-btn:hover {
            background: #2980b9;
        }
        textarea {
            flex: 1;
            min-height: 500px;
            padding: 15px;
            border: 1px solid #333; /* 边框改为深灰色 */
            border-top: none;
            border-radius: 0 0 6px 6px;
            resize: vertical;
            font-family: "Consolas", "Monaco", monospace;
            font-size: 14px;
            line-height: 1.5;
            background: #1e1e1e; /* 文本框背景改为深灰色 */
            color: #e0e0e0; /* 文本框文字颜色改为浅灰色 */
        }
        textarea::placeholder {
            color: #888; /* 占位符文字颜色改为灰色 */
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            background: #3498db; /* 主按钮背景保持蓝色 */
            color: white; /* 按钮文字保持白色 */
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: #2980b9;
        }
        button:active {
            background: #1f618d;
        }
        /* 新增文件导入按钮样式，与原有按钮统一 */
        .file-input-btn {
            position: relative;
            overflow: hidden;
        }
        .file-input-btn input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .status {
            margin-top: 10px;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e1e1e; /* 状态栏背景改为深灰色 */
            border: 1px solid #333; /* 状态栏边框改为深灰色 */
        }
        .status.valid {
            background: #1e3a1e; /* 有效状态背景改为深绿色 */
            color: #4caf50; /* 有效状态文字改为绿色 */
            border-color: #2e7d32;
        }
        .status.invalid {
            background: #3a1e1e; /* 无效状态背景改为深红色 */
            color: #f44336; /* 无效状态文字改为红色 */
            border-color: #c62828;
        }
        @media (max-width: 900px) {
            .editor-group {
                flex-direction: column;
            }
            .panel-info {
                flex-direction: column;
                gap: 5px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JSON/JSON5 转换格式化工具</h1>
        <div class="editor-group">
            <!-- 输入区 -->
            <div class="editor-panel">
                <div class="panel-title">
                    <span>输入 JSON/JSON5</span>
                    <div class="panel-info">
                        <div class="format-btns">
                            <button class="format-btn" onclick="convertToJson()">→ JSON</button>
                            <button class="format-btn" onclick="convertToJson5()">→ JSON5</button>
                        </div>
                        <span class="cursor-pos" id="cursor-pos">光标位置：行:列</span>
                    </div>
                </div>
                <textarea id="input" placeholder="粘贴或输入JSON/JSON5内容...也可通过下方按钮导入本地文件"></textarea>
                <div class="btn-group">
                    <button onclick="pasteInput()">📋 快捷粘贴</button>
                    <button onclick="clearInput()">🗑️ 清空输入</button>
                    <!-- 新增：本地文件导入按钮 -->
                    <button class="file-input-btn">📁 导入本地文件
                        <input type="file" id="fileInput" accept=".json,.json5,.txt" onchange="readLocalFile(this)">
                    </button>
                </div>
            </div>
            <!-- 输出区 -->
            <div class="editor-panel">
                <div class="panel-title">
                    <span>格式化结果</span>
                    <div class="panel-info">
                        <span class="error-msg" id="error-msg"></span>
                    </div>
                </div>
                <textarea id="output" readonly placeholder="格式化结果将显示在这里..."></textarea>
                <div class="btn-group">
                    <button onclick="copyOutput()">📋 复制结果</button>
                    <button onclick="clearOutput()">🗑️ 清空结果</button>
                </div>
            </div>
        </div>
        <!-- 状态提示 -->
        <div id="status" class="status">
            <span id="status-msg"></span>
        </div>
    </div>
    <!-- 引入JSON5解析库 -->
    <script src="json5.min.js"></script>
    <script>
        const inputEl = document.getElementById('input');
        const outputEl = document.getElementById('output');
        const statusMsgEl = document.getElementById('status-msg');
        const cursorPosEl = document.getElementById('cursor-pos');
        const errorMsgEl = document.getElementById('error-msg');
        const statusEl = document.getElementById('status');
        
        // 实时监听输入与光标
        inputEl.addEventListener('input', formatJson);
        inputEl.addEventListener('click', updateCursorPos);
        inputEl.addEventListener('keyup', updateCursorPos);
        inputEl.addEventListener('focus', updateCursorPos);
        
        // 格式化核心逻辑
        function formatJson() {
            const input = inputEl.value.trim();
            if (!input) {
                outputEl.value = '';
                setStatus('', 'valid');
                setErrorMsg('');
                updateCursorPos();
                return;
            }
            try {
                // 优先用JSON5解析（兼容JSON）
                const parsed = JSON5.parse(input);
                const formatted = JSON.stringify(parsed, null, 4);
                outputEl.value = formatted;
                setStatus('✅ JSON/JSON5 格式有效', 'valid');
                setErrorMsg('');
            } catch (err) {
                outputEl.value = '';
                setStatus('', 'valid');
                setErrorMsg(`❌ ${err.message}`);
            }
            updateCursorPos();
        }
        
        // 转换为标准JSON（去掉JSON5特性）
        function convertToJson() {
            const input = inputEl.value.trim();
            if (!input) {
                setErrorMsg('❌ 无内容可转换');
                return;
            }
            try {
                const parsed = JSON5.parse(input);
                const jsonStr = JSON.stringify(parsed, null, 4);
                outputEl.value = jsonStr;
                setStatus('✅ 已转为标准 JSON', 'valid');
                setErrorMsg('');
            } catch (err) {
                setErrorMsg(`❌ 转换失败：${err.message}`);
            }
        }
        
        // 转换为JSON5（保留注释、单引号、尾逗号等）
        function convertToJson5() {
            const input = inputEl.value.trim();
            if (!input) {
                setErrorMsg('❌ 无内容可转换');
                return;
            }
            try {
                const parsed = JSON5.parse(input);
                // JSON5.stringify 生成JSON5格式（支持单引号、无引号键等）
                const json5Str = JSON5.stringify(parsed, null, 4);
                outputEl.value = json5Str;
                setStatus('✅ 已转为 JSON5 格式', 'valid');
                setErrorMsg('');
            } catch (err) {
                setErrorMsg(`❌ 转换失败：${err.message}`);
            }
        }
        
        // 实时更新光标位置（行:列）
        function updateCursorPos() {
            const value = inputEl.value;
            const pos = inputEl.selectionStart;
            // 计算行号与列号
            const lines = value.substring(0, pos).split('\n');
            const row = lines.length;
            const col = lines[lines.length - 1].length + 1;
            cursorPosEl.textContent = `光标位置：${row}:${col}`;
        }
        
        // 设置错误消息
        function setErrorMsg(msg) {
            errorMsgEl.textContent = msg;
        }
        
        // 输入框快捷粘贴
        async function pasteInput() {
            try {
                const text = await navigator.clipboard.readText();
                inputEl.value = text;
                formatJson();
                setErrorMsg('');
            } catch (err) {
                setErrorMsg('❌ 粘贴失败：浏览器权限不足');
            }
        }
        
        // 输出框复制
        async function copyOutput() {
            const text = outputEl.value;
            if (!text) {
                setErrorMsg('❌ 无内容可复制');
                return;
            }
            try {
                await navigator.clipboard.writeText(text);
                setStatus('✅ 复制成功！', 'valid');
                setTimeout(() => setStatus('', 'valid'), 2000);
            } catch (err) {
                setErrorMsg('❌ 复制失败');
            }
        }
        
        // 清空输入
        function clearInput() {
            inputEl.value = '';
            formatJson();
            setErrorMsg('');
        }
        
        // 清空输出
        function clearOutput() {
            outputEl.value = '';
            setStatus('', 'valid');
            setErrorMsg('');
        }
        
        // 设置状态提示
        function setStatus(msg, type) {
            statusMsgEl.textContent = msg;
            statusEl.className = `status ${type}`;
        }
        
        // 新增：读取本地JSON5/JSON/TXT文件核心逻辑
        function readLocalFile(fileInput) {
            const file = fileInput.files[0];
            if (!file) return;
            // 校验文件类型（兼容json/json5/txt）
            const validTypes = ['application/json', 'text/plain', 'application/json5'];
            const validExts = ['.json', '.json5', '.txt'];
            const fileExt = '.' + file.name.split('.').pop().toLowerCase();
            if (!validTypes.includes(file.type) && !validExts.includes(fileExt)) {
                setErrorMsg('❌ 仅支持导入.json/.json5/.txt格式文件');
                fileInput.value = ''; // 重置文件选择
                return;
            }
            // 读取文件内容
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const content = e.target.result;
                    inputEl.value = content; // 将文件内容写入输入框
                    formatJson(); // 自动格式化
                    setStatus(`✅ 成功导入文件：${file.name}`, 'valid');
                    setErrorMsg('');
                } catch (err) {
                    setErrorMsg(`❌ 文件读取失败：${err.message}`);
                }
                fileInput.value = ''; // 重置文件选择，支持重复选择同一文件
            };
            reader.onerror = function() {
                setErrorMsg('❌ 文件读取异常，请检查文件是否损坏');
                fileInput.value = '';
            };
            // 以文本方式读取文件
            reader.readAsText(file, 'UTF-8');
        }
    </script>
</body>
</html>
